name: Deploy zu Azure Container App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: aad-experiment
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  APP_NAME: aad-experiment-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login zu Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Docker Build and Push
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} -t $REGISTRY/$IMAGE_NAME:latest .
          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}
          docker push $REGISTRY/$IMAGE_NAME:latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Container App anlegen oder updaten
        run: |
          ENV_ID=$(az containerapp show \
            --name smartscope-backend \
            --resource-group $RESOURCE_GROUP \
            --query "properties.environmentId" -o tsv)
          EXISTS=$(az containerapp show \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "name" -o tsv 2>/dev/null || echo "")
          if [ -z "$EXISTS" ]; then
            az containerapp create \
              --name $APP_NAME \
              --resource-group $RESOURCE_GROUP \
              --environment "$ENV_ID" \
              --image $REGISTRY/$IMAGE_NAME:${{ github.sha }} \
              --registry-server $REGISTRY \
              --registry-username ${{ secrets.ACR_USERNAME }} \
              --registry-password ${{ secrets.ACR_PASSWORD }} \
              --target-port 80 \
              --ingress external \
              --min-replicas 0 --max-replicas 1 \
              --cpu 0.25 --memory 0.5Gi
          else
            az containerapp update \
              --name $APP_NAME \
              --resource-group $RESOURCE_GROUP \
              --image $REGISTRY/$IMAGE_NAME:${{ github.sha }}
          fi

      - name: URL ausgeben
        run: |
          FQDN=$(az containerapp show \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "App laeuft unter: https://$FQDN"
