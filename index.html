<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8"><title>Azure AD Test</title></head>
<body style="font-family:sans-serif;padding:2rem;background:#1b212e;color:white">
  <h1 style="color:#b39c4d">✅ Azure AD Login erfolgreich!</h1>
  <p>Du bist eingeloggt. Diese Seite ist durch Azure Entra ID geschützt.</p>
  <p style="color:#94a3b8;font-size:0.85rem">
    Angemeldeter User: <strong id="user">wird geladen...</strong>
  </p>
  <script>
    fetch('/.auth/me')
      .then(r => r.json())
      .then(data => {
        const name = data[0]?.user_claims?.find(c => c.typ === 'name')?.val ?? data[0]?.user_id ?? 'unbekannt';
        document.getElementById('user').textContent = name;
      })
      .catch(() => document.getElementById('user').textContent = 'nicht verfügbar');
  </script>
</body>
</html>
